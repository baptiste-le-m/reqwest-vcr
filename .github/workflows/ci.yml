name: CI

# This workflow run tests and build for each push

on:
  push:
    branches:
      - '*'
  pull_request_target:
    types: [assigned, opened, synchronize, reopened]

jobs:

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        reqwest-version: ["reqwest-0_12", "reqwest-0_13"]
    name: test (${{ matrix.reqwest-version }})
    steps:
      - uses: actions/checkout@v2

      - name: Update local toolchain
        run: |
          rustup update
          rustup install nightly

      - name: Toolchain info
        run: |
          cargo --version --verbose
          rustc --version

      - name: Lint
        run: |
          cargo fmt -- --check
          cargo clippy --no-default-features --features=${{ matrix.reqwest-version }} -- -D warnings

      - name: Test
        run: |
          cargo check --no-default-features --features=${{ matrix.reqwest-version }}
          docker compose up -d
          cargo test --no-default-features --features=${{ matrix.reqwest-version }} --all
          cargo test --no-default-features --features=${{ matrix.reqwest-version }},compress --all

      - name: Build
        run: |
          cargo build --no-default-features --features=${{ matrix.reqwest-version }} --release
